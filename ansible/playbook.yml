---
- name: getting inside azure vm 
  hosts: ssh-host
  become: true
  remote_user: azureuser
  vars:
    project_dir: /home/azureuser/benchmarking_project
    playbook_dir: "{{ playbook_dir }}"

  tasks:
  - name : update cache  
    apt:
      update_cache: yes
      force_apt_get: yes
      update_cache_retries: 5
      update_cache_retry_max_delay: 30
    
  - name: install gcc and g++ 
    apt:
      name: 
        - build-essential
      state: present

  - name : install javac 
    apt:
      name: default-jdk
      state: present

  - name: Ensure project directory exists
    raw: mkdir -p {{ project_dir }}/scripts {{ project_dir }}/codes {{ project_dir }}/results
    changed_when: false


  - name: copying directory to azure vm 
    synchronize:
      src: ../scripts/
      dest: "{{ project_dir }}/scripts/"  
      
  - name: copy codes to azure rm 
    synchronize:
      src: ../codes/
      dest: "{{ project_dir }}/codes"
    
  - name: Make benchmark script executable
    file:
        path: "{{ project_dir }}/scripts/run_benchmark.sh"
        mode: "0755"
        state: file

  - name: run the benchmarking script for given languages 
    command: bash "{{ project_dir }}/scripts/run_benchmark.sh" "{{ benchmark_target }}"
    args:
      chdir: "{{project_dir}}"

  - name: fetch output directory for java benchmarking 
    synchronize:
      src: "{{project_dir}}/results/"
      dest: "{{playbook_dir}}/../results/{{benchmark_target}}/"
      mode: pull
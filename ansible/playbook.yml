---
- name: getting inside azure vm 
  hosts: ssh-host
  become: true
  gather_facts: false  # Add this

  tasks:
  - name: Install Python 3.8
    raw: apt update && apt install -y python3
    become: true  

  - name: install gcc and g++ 
    raw: apt install -y build-essential
    become: true

  - name : install javac 
    raw: apt install -y default-jdk
    become: true


  - name: copying directory to azure vm 
    synchronize:
      src: ../scripts/
      dest: ./scripts

  - name: executing the script to get the top command output
    command: ./scripts/run.sh

  - name: getting output.txt file from azure vm to local machine
    fetch:
      src: ./scripts/top_output.txt
      dest: ../results/
      flat: yes

  
  - name: copy codes to azure rm 
    synchronize:
      src: ../codes/
      dest: ./codes

  - name: run the benchmarking script for given languages 
    command: ./scripts/Benchmarking.sh

  - name: fetch output directory for java benchmarking 
    synchronize:
      src: ./results/
      dest: ../results/
      mode: pull